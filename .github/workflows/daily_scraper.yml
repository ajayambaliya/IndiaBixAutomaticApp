name: Daily Current Affairs Scraper

on:
  schedule:
    # Run every day at 7:30 AM IST (2:00 AM UTC)
    - cron: '0 2 * * *'
  workflow_dispatch:  # Allow manual trigger from the Actions tab

jobs:
  scrape-and-generate:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: whatsapp/package.json

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Node.js dependencies
        working-directory: ./whatsapp
        run: npm install

      - name: Create .env file
        run: |
          echo "MONGO_DB_URI=${{ secrets.MONGO_DB_URI }}" > .env
          echo "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}" >> .env
          echo "ENGLISH_CHANNEL=${{ secrets.ENGLISH_CHANNEL }}" >> .env
          echo "GUJARATI_CHANNEL=${{ secrets.GUJARATI_CHANNEL }}" >> .env
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env
          echo "WHATSAPP_GROUPS=${{ secrets.WHATSAPP_GROUPS }}" >> .env

      - name: Get current month
        id: date
        run: |
          echo "MONTH=$(date +'%Y-%m')" >> $GITHUB_ENV

      - name: Run Scraper and Broadcast
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          MONGO_DB_URI: ${{ secrets.MONGO_DB_URI }}
          ENGLISH_CHANNEL: ${{ secrets.ENGLISH_CHANNEL }}
          GUJARATI_CHANNEL: ${{ secrets.GUJARATI_CHANNEL }}
          WHATSAPP_GROUPS: ${{ secrets.WHATSAPP_GROUPS }}
        run: |
          python main.py --languages en gu --send-telegram --send-whatsapp --github-actions